upload_command = cmd /c ""C:\Users\emaba\.platformio\penv\Scripts\python.exe" -m pyocd flash -t kl25z -M attach -v "$SOURCE""
monitor_speed = 115200
build_flags =
    -Wl,-u,_printf_float